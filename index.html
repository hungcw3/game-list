<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh Sách Game Của Tôi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Trang đăng nhập / đăng ký -->
  <div id="auth-page">
    <h1>🎮 Game List</h1>

    <div id="auth-form">
      <input type="email" id="auth-email" placeholder="Email..." />
      <input type="password" id="auth-password" placeholder="Password..." />
      <button id="login-btn">Đăng nhập</button>
      <button id="register-btn">Đăng ký</button>
      <p id="auth-error"></p>
    </div>
  </div>

  <!-- Trang danh sách game -->
  <div id="main-page" style="display:none">
    <div class="main-header">
      <h1>🎮 Danh Sách Game Của Tôi</h1>
      <button id="logout-btn">Đăng xuất</button>
    </div>

    <form id="game-form">
      <input type="text" id="game-name" placeholder="Tên game..." />
      <button type="submit">Thêm game</button>
    </form>

    <ul id="game-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
